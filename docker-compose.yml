version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: bik-mongodb
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mongodb-setup:
    image: mongo:latest
    container_name: bik-mongodb-setup
    depends_on:
      - mongodb
    entrypoint: [ "bash", "-c", "sleep 3 && mongosh --host mongodb --eval 'rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongodb:27017\"}]})' || true" ]

  auth-service:
    build: 
      context: ../BIK-Auth-Service
      dockerfile: Dockerfile
    container_name: bik-auth-service
    ports:
      - "5213:8080"
    environment:
      - MongoDbSettings__ConnectionString=mongodb://mongodb:27017?replicaSet=rs0
      - MongoDbSettings__DatabaseName=bik_core_db
      - JwtSettings__Secret=TuClaveSecretaSuperSeguraParaValidarTokensDeCSharp
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - mongodb
    restart: unless-stopped

  server-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bik-server-admin
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/bik_core_db?replicaSet=rs0
      - AUTH_SERVICE_URL=http://auth-service:8080
      - CLIENT_URL=http://localhost:5173
      - JWT_SECRET=TuClaveSecretaSuperSeguraParaValidarTokensDeCSharp
    depends_on:
      - mongodb
      - auth-service
    restart: unless-stopped

  client-admin:
    build:
      context: ../BIK-Client-Admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000/api
        - VITE_AUTH_API_URL=http://localhost:5213/api
    container_name: bik-client-admin
    ports:
      - "5174:80"
    depends_on:
      - server-admin
      - auth-service
    restart: unless-stopped

volumes:
  mongodb_data:
